<!DOCTYPE html>
<html lang="en">
<head>

  <title>Nicole Portfolio</title>
 
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: flex;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 70px;
      background: white;
    }

    header h1 {
      color: #3b82f6;
    }

    nav a {
      margin:  15px;
      text-decoration: none;
      color: #555;
      font-weight: 500;
    }

    nav a.active {
      color: #3b82f6;
      border-bottom: 4px solid #3b82f6;
      padding-bottom: 10px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px;
    }

    .hero-text {
      max-width: 50%;
    }

    .hero-text h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero-text h3 {
      font-weight: normal;
      margin-bottom: 30px;
    }

    .hero-text p {
      margin-bottom: 30px;
      color: #666;
    }

    .btn {
      background: #3b82f6;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .hero-img img {
      width: 200px;
      border-radius: 10px;
    }

    section {
      padding: 60px;
    }

    .section-title {
      font-size: 28px;
      margin-bottom: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: white;
      margin-top: 40px;
    }
  </style>
</head>
